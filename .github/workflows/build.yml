name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: lint-

      - name: Clippy
        run: cargo clippy --release -- -D warnings

  build:
    needs: lint
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: six-eyes.exe
            asset: six-eyes-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: six-eyes
            asset: six-eyes-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: six-eyes
            asset: six-eyes-macos-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: target/release/${{ matrix.artifact }}

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/six-eyes-windows-x64.exe/six-eyes.exe artifacts/six-eyes-windows-x64.exe.tmp
          rm -rf artifacts/six-eyes-windows-x64.exe
          mv artifacts/six-eyes-windows-x64.exe.tmp artifacts/six-eyes-windows-x64.exe
          mv artifacts/six-eyes-linux-x64/six-eyes artifacts/six-eyes-linux-x64.tmp
          rm -rf artifacts/six-eyes-linux-x64
          mv artifacts/six-eyes-linux-x64.tmp artifacts/six-eyes-linux-x64
          mv artifacts/six-eyes-macos-arm64/six-eyes artifacts/six-eyes-macos-arm64.tmp
          rm -rf artifacts/six-eyes-macos-arm64
          mv artifacts/six-eyes-macos-arm64.tmp artifacts/six-eyes-macos-arm64

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete previous build release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh release list --limit 50 --json tagName -q '.[].tagName' | grep '^build-' | head -1)
          if [ -n "$prev" ] && [ "$prev" != "build-${{ steps.sha.outputs.short }}" ]; then
            gh release delete "$prev" --yes --cleanup-tag
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: |
            artifacts/six-eyes-windows-x64.exe
            artifacts/six-eyes-linux-x64
            artifacts/six-eyes-macos-arm64
          make_latest: true
